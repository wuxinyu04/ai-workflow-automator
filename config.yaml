# AI Workflow Automator Configuration

# LLM Provider Configuration
llm:
  provider: mimo              # Options: mimo, claude, openai
  # api_key: sk-xxx          # Set via AWA_LLM_API_KEY env var
  base_url: https://api.mimo.ai/v1

# Pipeline Phases Configuration
phases:
  scan:
    enable: true
    include_patterns:
      - "*.py"
      - "*.ts"
      - "*.js"
    exclude_dirs:
      - ".git"
      - "node_modules"
      - "__pycache__"
      - ".venv"
      - "build"
      - "dist"
    max_file_size_kb: 500
    enable_security_scan: true
    enable_perf_scan: true
    enable_debt_scan: true

  refactor:
    enable: true
    max_proposals_per_run: 10
    auto_create_pr: false
    target_branch: "refactor/auto-{timestamp}"
    effort_threshold: "M"        # Only propose changes <= this effort

  test:
    enable: true
    output_dir: "tests/generated"
    framework: "pytest"
    coverage_target: 0.80
    generate_integration_tests: true
    max_test_cases_per_function: 8
    use_hypothesis: false

  doc:
    enable: true
    docs_root: "docs"
    api_docs_dir: "docs/api"
    changelog_file: "CHANGELOG.md"
    readme_file: "README.md"
    auto_update_changelog: true
    auto_update_api_docs: true
    style: "google"              # google | numpy | sphinx

# Output Configuration
output:
  dir: "awa_output"
  version: "Unreleased"
  dry_run: false               # If true, scan only (skip refactor/test/doc)

# Logging
logging:
  level: "INFO"                # DEBUG, INFO, WARNING, ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
